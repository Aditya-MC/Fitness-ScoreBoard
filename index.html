<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Fitness Competition</title>

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0;}
body{background:#f4f6fb;}

/* SCOREBOARD AREA */
.scoreboard{
    height:33vh;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    color:white;
    padding:15px;
    text-align:center;
}

.podium{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    height:70%;
    gap:15px;
}

.podium div{
    width:70px;
    border-radius:8px 8px 0 0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    color:black;
    font-weight:bold;
}

.first{height:120px;background:gold;}
.second{height:90px;background:silver;}
.third{height:70px;background:#cd7f32;}
.fourth{height:50px;background:#ccc;}

.container{padding:15px;text-align:center;}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#4e73df;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.history{
    margin-top:20px;
    text-align:left;
    background:white;
    padding:10px;
    border-radius:8px;
    max-height:200px;
    overflow:auto;
}

.history li{
    margin-bottom:8px;
    font-size:14px;
}

.edit-btn{background:#f6c23e;margin-left:5px;}
.delete-btn{background:#e74a3b;margin-left:5px;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
}

.modal-content input,
.modal-content select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="scoreboard">
    <h2>Monthly Competition</h2>
    <div class="podium" id="podium"></div>
</div>

<div class="container">
    <button onclick="openModal()">Log Workout</button>

    <div class="history">
        <h4>Workout History</h4>
        <ul id="historyList"></ul>
    </div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Log Workout</h3>

<select id="name">
<option>Adi</option>
<option>Venky</option>
<option>Yazhini</option>
<option>Pavi</option>
</select>

<input type="date" id="date">

<select id="work" onchange="toggleInput()">
<option value="walk">Walk</option>
<option value="run">Run</option>
<option value="weight">Weight Training</option>
</select>

<input type="number" id="extraInput" placeholder="Enter KM">

<button onclick="saveWorkout()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
/* 🔥 REPLACE WITH YOUR FIREBASE CONFIG */
var firebaseConfig = {
  apiKey: "AIzaSyDKbep4QL7xviAcr8FwyGaHCTuFGIIzwy8",
  authDomain: "scoreboard-31945.firebaseapp.com",
  databaseURL: "https://scoreboard-31945-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "scoreboard-31945",
  storageBucket: "scoreboard-31945.firebasestorage.app",
  messagingSenderId: "32724836441",
  appId: "1:32724836441:web:fcf14cebe65705cbe29148",
  measurementId: "G-G0XWNHEWQ8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let editId=null;

function openModal(){ document.getElementById("modal").style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function toggleInput(){
  let work=document.getElementById("work").value;
  document.getElementById("extraInput").placeholder =
    work==="weight" ? "Enter Hours" : "Enter KM";
}

function saveWorkout(){

  const nameVal = document.getElementById("name").value;
  const dateVal = document.getElementById("date").value;
  const workVal = document.getElementById("work").value;
  const amountVal = parseFloat(document.getElementById("extraInput").value);

  if(!dateVal || isNaN(amountVal)){
    alert("Fill all fields properly");
    return;
  }

  const points = 1 + amountVal;

  const data = {
    name: nameVal,
    date: dateVal,
    work: workVal,
    amount: amountVal,
    points: points
  };

  if(editId){
    db.ref("logs/"+editId).set(data);
    editId = null;
  } else {
    db.ref("logs").push(data);
  }

  closeModal();
}

db.ref("logs").on("value",snapshot=>{
  let logs=snapshot.val()||{};
  let scores={Adi:0,Venky:0,Yazhini:0,Pavi:0};

  let list=document.getElementById("historyList");
  list.innerHTML="";

  for(let id in logs){
    let log=logs[id];
    scores[log.name]+=log.points;

    list.innerHTML+=`
      <li>
      ${log.date} - ${log.name} (${log.work} ${log.amount}) +${log.points}
      <button class="edit-btn" onclick="editLog('${id}')">Edit</button>
      <button class="delete-btn" onclick="deleteLog('${id}')">Del</button>
      </li>`;
  }

  updatePodium(scores);
});

function updatePodium(scores){
  let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  let classes=["first","second","third","fourth"];

  let podium=document.getElementById("podium");
  podium.innerHTML="";

  sorted.forEach((p,i)=>{
    podium.innerHTML+=`
      <div class="${classes[i]}">
        ${p[0]}<br>${p[1]} pts
      </div>`;
  });
}

function editLog(id){
  db.ref("logs/"+id).once("value").then(s=>{
    let log=s.val();
    name.value=log.name;
    date.value=log.date;
    work.value=log.work;
    extraInput.value=log.amount;
    editId=id;
    openModal();
  });
}

function deleteLog(id){
  db.ref("logs/"+id).remove();
}
</script>

</body>
</html>
