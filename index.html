<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Fitness Competition</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  padding-bottom:40px;
}

/* ===== SCOREBOARD ===== */
.scoreboard{
  padding:25px;
  text-align:center;
}

.scoreboard h2{
  font-size:28px;
  letter-spacing:1px;
  margin-bottom:20px;
}

/* ===== PODIUM ===== */
.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:20px;
  margin-top:20px;
}

.podium div{
  width:90px;
  border-radius:12px 12px 0 0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  font-weight:bold;
  padding:10px;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.podium div:hover{
  transform:translateY(-5px);
}

.first{
  height:150px;
  background:linear-gradient(145deg,#ffd700,#ffb700);
}

.second{
  height:120px;
  background:linear-gradient(145deg,#e0e0e0,#bfbfbf);
}

.third{
  height:100px;
  background:linear-gradient(145deg,#d4a373,#a47148);
}

.fourth{
  height:80px;
  background:#888;
}

/* ===== CONTAINER ===== */
.container{
  width:100%;
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* ===== BUTTON ===== */
button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#4e73df,#1cc88a);
  color:white;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* ===== PLAYER CARDS ===== */
.cards-wrapper{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:40px;
}

.card{
  width:260px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  text-align:left;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card h3{
  margin-bottom:15px;
  font-size:20px;
}

.card p{
  margin:8px 0;
  font-size:15px;
}

/* ===== HISTORY ===== */
.history{
  margin-top:40px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  max-height:250px;
  overflow:auto;
}

.history h4{
  margin-bottom:15px;
}

.history li{
  margin-bottom:10px;
  font-size:14px;
}

/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1f2a38;
  padding:25px;
  border-radius:20px;
  width:320px;
}

.modal-content input,
.modal-content select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
}
</style>
</head>
<body>

<div class="scoreboard">
    <h2>Monthly Competition</h2>
    <div class="podium" id="podium"></div>
</div>

<div class="container">
    <button onclick="openModal()">Log Workout</button>

    <div class="cards-wrapper" id="playerCards"></div>

    <div class="history">
        <h4>Workout History</h4>
        <ul id="historyList"></ul>
    </div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Log Workout</h3>

<select id="name">
<option>Adi</option>
<option>Venky</option>
<option>Yazhini</option>
<option>Pavi</option>
</select>

<input type="date" id="date">

<select id="work" onchange="toggleInput()">
<option value="walk">Walk</option>
<option value="run">Run</option>
<option value="weight">Weight Training</option>
<option value="rest">Rest Day</option>
</select>

<input type="number" id="extraInput" placeholder="Enter KM">

<button onclick="saveWorkout()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDKbep4QL7xviAcr8FwyGaHCTuFGIIzwy8",
  authDomain: "scoreboard-31945.firebaseapp.com",
  databaseURL: "https://scoreboard-31945-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "scoreboard-31945",
  storageBucket: "scoreboard-31945.firebasestorage.app",
  messagingSenderId: "32724836441",
  appId: "1:32724836441:web:fcf14cebe65705cbe29148",
  measurementId: "G-G0XWNHEWQ8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
    
let editId=null;
const REST_LIMIT=8;

function openModal(){ document.getElementById("modal").style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function toggleInput(){
  let work=document.getElementById("work").value;
  let input=document.getElementById("extraInput");
  if(work==="rest") input.style.display="none";
  else{
    input.style.display="block";
    input.placeholder= work==="weight"?"Enter Hours":"Enter KM";
  }
}

function saveWorkout(){
  const name=document.getElementById("name").value;
  const date=document.getElementById("date").value;
  const work=document.getElementById("work").value;
  const amount=parseFloat(document.getElementById("extraInput").value);

  if(!date) return alert("Select date");
  if(work!=="rest" && isNaN(amount)) return alert("Enter value");

  const data={name,date,work,amount:work==="rest"?0:amount};

  if(editId){
    db.ref("logs/"+editId).set(data);
    editId=null;
  }else{
    db.ref("logs").push(data);
  }

  closeModal();
}

db.ref("logs").on("value",snapshot=>{
  const logs=snapshot.val()||{};
  calculateScores(logs);
  renderHistory(logs);
});

function calculateScores(logs){

  const players=["Adi","Venky","Yazhini","Pavi"];
  let result={};

  players.forEach(player=>{

    let userLogs=Object.entries(logs || {})
      .filter(([id,l])=>l.name===player)
      .sort((a,b)=>new Date(a[1].date)-new Date(b[1].date));

    let streak=0;
    let consistency=0;
    let activity=0;
    let restUsed=0;
    let totalPoints=0;

    let lastDate=null;

    userLogs.forEach(([id,log])=>{

      if(!lastDate){
        streak=1;
      }else{
        let diff=(new Date(log.date)-new Date(lastDate))/(1000*60*60*24);

        if(diff===1){
          streak++;
          consistency+=0.5;
          totalPoints+=0.5; // 🔥 add bonus to total
        }
        else if(diff>1){
          let penalty=1;
          consistency=Math.max(0,consistency-penalty);
          streak=1;
        }
      }

      if(log.work==="weight"){
    activity+=log.amount * 2;
    totalPoints+=log.amount * 2;
}
else if(log.work==="walk" || log.work==="run"){
    activity+=log.amount;
    totalPoints+=log.amount;
}else{
        restUsed++;
      }

      lastDate=log.date;
    });

    result[player]={
      total:Number(totalPoints.toFixed(2)),
      activity:Number(activity.toFixed(2)),
      streak,
      consistency:Number(consistency.toFixed(2)),
      restLeft:REST_LIMIT-restUsed
    };
  });

  updatePodium(result);
  updateCards(result);
}

function updatePodium(result){
  let sorted=Object.entries(result)
    .sort((a,b)=>b[1].total-a[1].total);

  const classes=["first","second","third","fourth"];
  const podium=document.getElementById("podium");
  podium.innerHTML="";

  sorted.forEach((p,i)=>{
    podium.innerHTML+=`
      <div class="${classes[i]}">
        ${p[0]}<br>${p[1].total} pts
      </div>`;
  });
}

function updateCards(result){
  const container=document.getElementById("playerCards");
  container.innerHTML="";

  Object.entries(result).forEach(([name,data])=>{
    container.innerHTML+=`
      <div class="card">
        <h3>🏆 ${name}</h3>
        <p>⭐ Total: ${data.total}</p>
        <p>🔥 Streak: ${data.streak} days</p>
        <p>⚡ Consistency: ${data.consistency}</p>
        <p>😌 Rest Days Left: ${data.restLeft}</p>
      </div>`;
  });
}

function renderHistory(logs){
  const list=document.getElementById("historyList");
  list.innerHTML="";

  Object.entries(logs).forEach(([id,log])=>{
    list.innerHTML+=`
      <li>
        ${log.date} - ${log.name} (${log.work} ${log.amount})
        <button onclick="editLog('${id}')">Edit</button>
        <button onclick="deleteLog('${id}')">Del</button>
      </li>`;
  });
}

function editLog(id){
  db.ref("logs/"+id).once("value").then(s=>{
    const log=s.val();
    document.getElementById("name").value=log.name;
    document.getElementById("date").value=log.date;
    document.getElementById("work").value=log.work;
    document.getElementById("extraInput").value=log.amount;
    editId=id;
    openModal();
  });
}

function deleteLog(id){
  db.ref("logs/"+id).remove();
}
</script>

</body>
</html>
