<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Fitness Competition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
}

/* ===== BACKGROUND ===== */

body{
  min-height:100vh;
  background:
  radial-gradient(circle at 10% 20%,rgba(0,255,200,0.15),transparent 40%),
  radial-gradient(circle at 90% 10%,rgba(0,140,255,0.2),transparent 40%),
  linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding-bottom:50px;
}

/* ===== CONSISTENCY LEADER ===== */

/* ===== CONSISTENCY LEADER ===== */

#consistencyLeader{
  position:fixed;
  top:18px;
  right:18px;
  background:rgba(0,255,140,0.08);
  backdrop-filter:blur(14px);
  padding:12px 18px;
  border-radius:16px;
  font-size:16px;
  font-weight:600;
  text-align:center;
  border:1px solid #00ff00;
  max-width:190px;
  transition:0.3s;
}



/* ===== MOBILE RESPONSIVE ===== */

@media (max-width:600px){

  #consistencyLeader{
    position:relative;
    top:auto;
    right:auto;
    margin:10px auto 0 auto;
    max-width:220px;
    font-size:13px;
  }

}

/* ===== DANGER ZONE ===== */

#dangerZone{
  position:fixed;
  top:18px;
  left:18px;
  background:rgba(255,60,60,0.12);
  backdrop-filter:blur(14px);
  padding:12px 18px;
  border-radius:16px;
  font-size:16px;
  font-weight:600;
  text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.45);
  border:1px solid #ff0000;
  max-width:180px;
  color:#ff6b6b;
}

#dangerPlayers{
  margin-top:6px;
  font-size:13px;
  font-weight:700;
  color:#ff3b3b;
}

/* mobile responsiveness */

@media (max-width:600px){

  #dangerZone{
    position:relative;
    top:auto;
    left:auto;
    margin:10px auto;
    max-width:220px;
  }

}
    
/* ===== SCOREBOARD ===== */

.scoreboard{
  padding:35px 20px;
  text-align:center;
}

.scoreboard h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;
  margin-bottom:25px;
  font-weight:normal;
  text-transform:uppercase;
  text-shadow:
    0 4px 10px rgba(0,0,0,0.6),
    0 0 12px rgba(255,255,255,0.15);
}

/* ===== PODIUM ===== */

.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:28px;
  margin-top:20px;
}

.podium div{
  width:100px;
  border-radius:16px 16px 0 0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  font-weight:600;
  padding:12px;
  color:#111;
  box-shadow:0 12px 35px rgba(0,0,0,0.5);
  transition:0.35s;
  position:relative;
}

.podium div:hover{
  transform:translateY(-10px);
}

/* FIRST PLACE */

.first{
  height:190px;
  background:linear-gradient(145deg,#ffd700,#ffb300);
  box-shadow:0 0 20px rgba(255,215,0,0.7);
}

.first::before{
  content:"👑";
  position:absolute;
  top:-30px;
  font-size:26px;
}

/* SECOND */

.second{
  height:150px;
  background:linear-gradient(145deg,#e6e6e6,#bfbfbf);
}

/* THIRD */

.third{
  height:125px;
  background:linear-gradient(145deg,#d4a373,#a47148);
}

/* OTHER PLAYERS */

.fourth{
  height:100px;
  background:rgba(255,255,255,0.35);
}

/* ===== CONTAINER ===== */

.container{
  width:100%;
  max-width:1050px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* ===== BUTTON ===== */

button{
  padding:11px 24px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#4e73df,#1cc88a);
  color:white;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
  transition:0.25s;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

button:hover{
  transform:scale(1.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.deletePlayerBtn{
  margin-top:12px;
  background:linear-gradient(135deg,#ff4b4b,#c91818);
}

.deletePlayerBtn:hover{
  background:linear-gradient(135deg,#ff2a2a,#a50000);
}
/* ===== PLAYER CARDS ===== */

.cards-wrapper{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:32px;
  margin-top:45px;
}

.card{
  width:280px;
  padding:28px;
  border-radius:22px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
  text-align:left;
  transition:0.35s;
  position:relative;
}

/* subtle neon border */

.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  padding:1px;
  background:linear-gradient(120deg,#00f2ff,#1cc88a,#4e73df);
  -webkit-mask:
  linear-gradient(#000 0 0) content-box,
  linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
  opacity:0.7;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 20px 50px rgba(0,0,0,0.65);
}

.card h3{
  margin-bottom:16px;
  font-size:22px;
  font-weight:600;
}

.card p{
  margin:10px 0;
  font-size:15px;
  letter-spacing:0.4px;
}

/* ===== HISTORY ===== */

.history{
  margin-top:50px;
  background:rgba(255,255,255,0.06);
  padding:25px;
  border-radius:22px;
  backdrop-filter:blur(16px);
  max-height:260px;
  overflow:auto;
  box-shadow:0 12px 35px rgba(0,0,0,0.45);
}

.history h4{
  margin-bottom:18px;
  font-size:18px;
}

.history li{
  margin-bottom:10px;
  font-size:14px;
  opacity:0.9;
}

/* ===== MODAL ===== */
.topCards{
    display:flex;
  justify-content:space-around;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1a2633;
  padding:28px;
  border-radius:22px;
  width:340px;
  box-shadow:0 15px 45px rgba(0,0,0,0.7);
}

.modal-content input,
.modal-content select{
  width:100%;
  padding:11px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#243445;
  color:white;
}

.modal-content h3{
  margin-bottom:15px;
  font-weight:600;
}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#4e73df;
  border-radius:10px;
}

</style>
</head>
<body>

<div class="scoreboard">
    <h2>Monthly Competition</h2>
    <div class="podium" id="podium"></div>
</div>

<div class="topCards">
        <div id="consistencyLeader">
        ⭐Peak Streaker⭐ <br>
        <span id="leaderName">--</span>
        </div>
        <div id="dangerZone">
        ⚠ Players in Danger
        <div id="dangerPlayers">--</div>
        </div>
</div>

    

<div class="container">
    <button onclick="addPlayer()">Add Player</button>
    <button onclick="openModal()">Log Workout</button>

    <div class="cards-wrapper" id="playerCards"></div>

    <div class="history">
        <h4>Workout History</h4>
        <ul id="historyList"></ul>
    </div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Log Workout</h3>


<select id="name">
<option>Adi</option>
<option>Venky</option>
<option>Yazhini</option>
<option>Pavi</option>
</select>

<input type="date" id="date">

<select id="work" onchange="toggleInput()">
<option value="walk">Walk</option>
<option value="run">Run</option>
<option value="weight">Weight Training</option>
<option value="rest">Rest Day</option>
</select>

<input type="number" id="extraInput" placeholder="Enter KM">

<button onclick="saveWorkout()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
   
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDKbep4QL7xviAcr8FwyGaHCTuFGIIzwy8",
  authDomain: "scoreboard-31945.firebaseapp.com",
  databaseURL: "https://scoreboard-31945-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "scoreboard-31945",
  storageBucket: "scoreboard-31945.firebasestorage.app",
  messagingSenderId: "32724836441",
  appId: "1:32724836441:web:fcf14cebe65705cbe29148",
  measurementId: "G-G0XWNHEWQ8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let players = [];

db.ref("players").on("value",snapshot=>{
  const data = snapshot.val() || {};
  players = Object.keys(data);

  updatePlayerDropdown();

  // reload scores when players change
  db.ref("logs").once("value").then(s=>{
    const logs = s.val() || {};
    calculateScores(logs);
  });
});

let editId=null;
const REST_LIMIT=8;

function openModal(){ document.getElementById("modal").style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function toggleInput(){
  let work=document.getElementById("work").value;
  let input=document.getElementById("extraInput");
  if(work==="rest") input.style.display="none";
  else{
    input.style.display="block";
    input.placeholder= work==="weight"?"Enter Hours":"Enter KM";
  }
}

function addPlayer(){

  const name = prompt("Enter Player Name");

  if(!name) return;

  db.ref("players/"+name).set({
    name:name
  });

}

function deletePlayer(playerName){

  const confirmDelete = confirm("Delete " + playerName + " and all their logs?");

  if(!confirmDelete) return;

  // remove player
  db.ref("players/"+playerName).remove();

  // remove all logs for that player
  db.ref("logs").once("value").then(snapshot=>{

    const logs = snapshot.val() || {};

    Object.entries(logs).forEach(([id,log])=>{
      if(log.name === playerName){
        db.ref("logs/"+id).remove();
      }
    });

  });

}

    
function updatePlayerDropdown(){

  const select=document.getElementById("name");

  select.innerHTML="";

  players.forEach(p=>{
    select.innerHTML += `<option>${p}</option>`;
  });

}
    
function saveWorkout(){
  const name=document.getElementById("name").value;
  const date=document.getElementById("date").value;
  const work=document.getElementById("work").value;
  const amount=parseFloat(document.getElementById("extraInput").value);

  if(!date) return alert("Select date");
  if(work!=="rest" && isNaN(amount)) return alert("Enter value");

  const data={name,date,work,amount:work==="rest"?0:amount};

  if(editId){
    db.ref("logs/"+editId).set(data);
    editId=null;
  }else{
    db.ref("logs").push(data);
  }

  closeModal();
}

db.ref("logs").on("value",snapshot=>{
  const logs=snapshot.val()||{};
  calculateScores(logs);
  renderHistory(logs);
});

function calculateScores(logs){

  let result={};

  players.forEach(player=>{

    let userLogs=Object.entries(logs || {})
      .filter(([id,l])=>l.name===player)
      .sort((a,b)=>new Date(a[1].date)-new Date(b[1].date));

    let streak=0;
    let consistency=0;
    let activity=0;
    let restUsed=0;
    let totalPoints=0;

    let lastDate=null;

    userLogs.forEach(([id,log])=>{

      if(!lastDate){
        streak=1;
      }else{
        let diff=(new Date(log.date)-new Date(lastDate))/(1000*60*60*24);

        if(diff===1){
          streak++;
          consistency+=0.5;
          totalPoints+=0.5; // 🔥 add bonus to total
        }
        else if(diff>1){
          let penalty=(diff-1)*2;
          consistency=Math.max(0,consistency-penalty);
          streak=1;
        }
      }

      if(log.work==="weight"){
    activity+=log.amount * 2;
    totalPoints+=log.amount * 2;
}
else if(log.work==="walk" || log.work==="run"){
    activity+=log.amount;
    totalPoints+=log.amount;
}else{
        restUsed++;
      }

      lastDate=log.date;
    });

    result[player]={
      total:Number(totalPoints.toFixed(2)),
      activity:Number(activity.toFixed(2)),
      streak,
      consistency:Number(consistency.toFixed(2)),
      restLeft:REST_LIMIT-restUsed
    };
  });

  updatePodium(result);
  updateCards(result);
  updateConsistencyLeader(result);
  updateDangerZone(result);
}

function updatePodium(result){
  let sorted=Object.entries(result)
    .sort((a,b)=>b[1].total-a[1].total);

  const classes=["first","second","third","fourth"];
  const podium=document.getElementById("podium");
  podium.innerHTML="";

  sorted.forEach((p,i)=>{
    podium.innerHTML+=`
      <div class="${classes[i]}">
        ${p[0]}<br>${p[1].total} pts
      </div>`;
  });
}

function updateCards(result){
  const container=document.getElementById("playerCards");
  container.innerHTML="";

  Object.entries(result).forEach(([name,data])=>{
    container.innerHTML+=`
  <div class="card">
    <h3>🏆 ${name}</h3>
    <p>⭐ Total: ${data.total}</p>
    <p>🔥 Streak: ${data.streak} days</p>
    <p>⚡ Consistency: ${data.consistency}</p>
    <p>😌 Rest Days Left: ${data.restLeft}</p>

    <button class="deletePlayerBtn" onclick="deletePlayer('${name}')">
      Delete Player
    </button>

  </div>
`;
  });
}

function updateConsistencyLeader(result){

  let sorted = Object.entries(result)
    .sort((a,b)=>b[1].consistency - a[1].consistency);

  if(sorted.length===0) return;

  const leader = sorted[0];

  document.getElementById("leaderName").innerHTML =
`👑 ${leader[0]} (${leader[1].consistency})<br>
<span style="font-size:25px;font-weight:700; color: #00ff00;">${leader[1].streak} DAYS</span>`;
}

function updateDangerZone(result){

  let sorted = Object.entries(result)
  .sort((a,b)=>a[1].total - b[1].total);

  if(sorted.length < 2) return;

  const player1 = sorted[0];
  const player2 = sorted[1];

  document.getElementById("dangerPlayers").innerHTML =
    player1[0] + " (" + player1[1].total + ")<br>" +
    player2[0] + " (" + player2[1].total + ")";
}

    
    
function renderHistory(logs){
  const list=document.getElementById("historyList");
  list.innerHTML="";

  Object.entries(logs).forEach(([id,log])=>{
    list.innerHTML+=`
      <li>
        ${log.date} - ${log.name} (${log.work} ${log.amount})
        <button onclick="editLog('${id}')">Edit</button>
        <button onclick="deleteLog('${id}')">Del</button>
      </li>`;
  });
}

function editLog(id){
  db.ref("logs/"+id).once("value").then(s=>{
    const log=s.val();
    document.getElementById("name").value=log.name;
    document.getElementById("date").value=log.date;
    document.getElementById("work").value=log.work;
    document.getElementById("extraInput").value=log.amount;
    editId=id;
    openModal();
  });
}

function deleteLog(id){
  db.ref("logs/"+id).remove();
}
</script>

</body>
</html>
