<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Fitness Competition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  margin:0;
  padding:0;
}

/* ===== BACKGROUND ===== */

body{
  min-height:100vh;
  background:#0f1115;
  color:#e5e7eb;
}

/* ===== HEADER ===== */

.scoreboard{
  padding:30px 20px;
  text-align:center;
}

.scoreboard h2{
  font-size:34px;
  font-weight:600;
  letter-spacing:1px;
  color:#f9fafb;
}

/* ===== PODIUM ===== */

.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:16px;
  margin-top:25px;
  overflow-x:auto;
  padding-bottom:10px;
}

.podium::-webkit-scrollbar{
  display:none;
}

.podium div{
  width:90px;
  border-radius:10px;
  padding:12px;
  font-weight:500;
  color:black;
  background:white;
  text-align:center;
}

/* subtle hierarchy */

.first{
  height:150px;
  background:#ffffff;
  color:#111;
}

.second{
  height:120px;
  background:#d1d5db;
}

.third{
  height:100px;
  background:#9ca3af;
}

.fourth{
  height:91px;
  background:#6b7280;
  color:white;
}

.fifth{
  height:91px;
  background:#6b7280;
  color:white;
}

/* ===== TOP BADGES ===== */

#consistencyLeader,
#dangerZone{
  position:fixed;
  top:15px;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:500;
  background:#1a1c22;
  border:1px solid #2a2d35;
}

#consistencyLeader{
  right:15px;
  color:white;
}

#dangerZone{
  left:15px;
  color:#f87171;
}

/* ===== CONTAINER ===== */

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* ===== BUTTON ===== */

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#ffffff;
  color:#111;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
}

input{

  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#ffffff;
  color:#111;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;

}

select{
    padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#ffffff;
  color:#111;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}

.deletePlayerBtn{
  background:#ef4444;
  color:white;
}

/* ===== CARDS ===== */

.cards-wrapper{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

/* ===== CARD ===== */

.card{
  width:280px;
  background:black;
  border-radius:16px;
  padding:18px;
  border:1px solid #2c313a;
  text-align:left;
  transition:0.3s;
  box-shadow:
    0 4px 20px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:
    0 8px 30px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* ===== NAME ===== */

.card h3{
  font-size:18px;
  font-weight:600;
  letter-spacing:0.5px;
  color:#f9fafb;
}

/* ===== MONEY BOX ===== */

.money-box{
    display:flex;
    justify-content:center;
    align-items:center;
  background:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  min-width:110px;
  border:1px solid #2a2f38;
  box-shadow:inset 0 0 8px rgba(0,0,0,0.6);
}

.gain{
  color:#22c55e;
  font-weight:600;
}

.loss{
  color:#ef4444;
  font-weight:600;
}

/* ===== STATS SECTION ===== */

.stats{
  margin-top:14px;
  padding:14px;
  border-radius:12px;
  background:white; /* ✅ white bg */
  color:#000; /* ✅ black text */
  border:1px solid #ddd;
  font-size:16px;
    font-weight:600px;
    
}

.stats p{
  margin:8px 0;
  color:#000; /* force black text */
  
}

/* subtle divider effect */
.stats p:not(:last-child){
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding-bottom:6px;
}

/* ===== NET PILL ===== */

.net-pill{
  padding:7px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.3px;
}

/* positive */ 

.net-positive{
  background:linear-gradient(145deg,#052e1a,#064e3b);
  color:#4ade80;
  border:1px solid #166534;
  box-shadow:0 0 10px rgba(34,197,94,0.15);
}

/* negative */

.net-negative{
  background:linear-gradient(145deg,#2a0b0b,#450a0a);
  color:#f87171;
  border:1px solid #7f1d1d;
  box-shadow:0 0 10px rgba(239,68,68,0.15);
}
/* ===== HISTORY ===== */

.history{
  margin-top:40px;
  background:#16181d;
  padding:20px;
  border-radius:14px;
  border:1px solid #262a33;
  max-height:260px;
  overflow:auto;
}

.history li{
  margin-bottom:8px;
  font-size:13px;
}

/* ===== MODAL ===== */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#16181d;
  padding:20px;
  border-radius:12px;
  width:320px;
  border:1px solid #2a2d35;
}

.modal-content input,
.modal-content select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:#0f1115;
  color:white;
}

/* ===== MOBILE ===== */

@media (max-width:600px){

  .card{
    width:100%;
  }

  #consistencyLeader,
  #dangerZone{
    position:relative;
    left:auto;
    right:auto;
    margin:8px;
    display:inline-block;
  }

  .scoreboard{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>
<body>

<div class="scoreboard">
    <h2>Monthly Competition</h2>
    <div class="podium" id="podium"></div>
</div>

<div class="topCards">
        <div id="consistencyLeader">
        ⭐Peak Streaker⭐ <br>
        <span id="leaderName">--</span>
        </div>
        <div id="dangerZone">
        ⚠ Players in Danger
        <div id="dangerPlayers">--</div>
        </div>
</div>

    

<div class="container">
    <button onclick="addPlayer()">Add Player</button>
    <button onclick="openModal()">Log Workout</button>

    <div class="cards-wrapper" id="playerCards"></div>

    <div class="history">
  <h4 id="historyTitle">Today's Logs</h4>

  <div style="display:flex;justify-content:center; align-items:center; gap:10px; margin-bottom:20px; margin-top:30px; flex-wrap:wrap;">
    
    <input type="date" id="filterDate">

    <select id="filterPlayer">
      <option value="">All Players</option>
    </select>

    <button onclick="applyFilters()">Filter</button>
    <button onclick="resetFilters()">Reset</button>

  </div>

  <ul id="historyList"></ul>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Log Workout</h3>


<select id="name">
<option>Adi</option>
<option>Venky</option>
<option>Yazhini</option>
<option>Pavi</option>
</select>

<input type="date" id="date">

<select id="work" onchange="toggleInput()">
<option value="walk">Walk</option>
<option value="run">Run</option>
<option value="weight">Weight Training</option>
<option value="rest">Rest Day</option>
</select>

<input type="number" id="extraInput" placeholder="Enter KM">

<button onclick="saveWorkout()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
   
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDKbep4QL7xviAcr8FwyGaHCTuFGIIzwy8",
  authDomain: "scoreboard-31945.firebaseapp.com",
  databaseURL: "https://scoreboard-31945-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "scoreboard-31945",
  storageBucket: "scoreboard-31945.firebasestorage.app",
  messagingSenderId: "32724836441",
  appId: "1:32724836441:web:fcf14cebe65705cbe29148",
  measurementId: "G-G0XWNHEWQ8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let players = [];

db.ref("players").on("value",snapshot=>{
  const data = snapshot.val() || {};
  players = Object.keys(data);

  updatePlayerDropdown();

  // reload scores when players change
  db.ref("logs").once("value").then(s=>{
    const logs = s.val() || {};
    calculateScores(logs);
  });
});

let editId=null;
const REST_LIMIT=8;

function openModal(){ document.getElementById("modal").style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function toggleInput(){
  let work=document.getElementById("work").value;
  let input=document.getElementById("extraInput");
  if(work==="rest") input.style.display="none";
  else{
    input.style.display="block";
    input.placeholder= work==="weight"?"Enter Hours":"Enter KM";
  }
}

function addPlayer(){

  const name = prompt("Enter Player Name");

  if(!name) return;

  db.ref("players/"+name).set({
    name:name
  });

}

function deletePlayer(playerName){

  const confirmDelete = confirm("Delete " + playerName + " and all their logs?");

  if(!confirmDelete) return;

  // remove player
  db.ref("players/"+playerName).remove();

  // remove all logs for that player
  db.ref("logs").once("value").then(snapshot=>{

    const logs = snapshot.val() || {};

    Object.entries(logs).forEach(([id,log])=>{
      if(log.name === playerName){
        db.ref("logs/"+id).remove();
      }
    });

  });

}

    
function updatePlayerDropdown(){

  const select=document.getElementById("name");
  const filterSelect=document.getElementById("filterPlayer");

  select.innerHTML="";
  filterSelect.innerHTML='<option value="">All Players</option>';

  players.forEach(p=>{
    select.innerHTML += `<option>${p}</option>`;
    filterSelect.innerHTML += `<option>${p}</option>`;
  });

}
    
function saveWorkout(){
  const name=document.getElementById("name").value;
  const date=document.getElementById("date").value;
  const work=document.getElementById("work").value;
  const amount=parseFloat(document.getElementById("extraInput").value);

  if(!date) return alert("Select date");
  if(work!=="rest" && isNaN(amount)) return alert("Enter value");

  const data={name,date,work,amount:work==="rest"?0:amount};

  if(editId){
    db.ref("logs/"+editId).set(data);
    editId=null;
  }else{
    db.ref("logs").push(data);
  }

  closeModal();
}

db.ref("logs").on("value",snapshot=>{
  const logs=snapshot.val()||{};
  calculateScores(logs);
  renderHistory(logs);
});

function calculateScores(logs){

  let result={};

  players.forEach(player=>{

    let userLogs=Object.entries(logs || {})
      .filter(([id,l])=>l.name===player)
      .sort((a,b)=>new Date(a[1].date)-new Date(b[1].date));

    let streak=0;
    let consistency=0;
    let activity=0;
    let restUsed=0;
    let totalPoints=0;

    let walkRunKM = 0;
    let weightHours = 0;

    let missedDays = 0;
    let lastDate=null;

    userLogs.forEach(([id,log])=>{

      if(!lastDate){
        streak=1;
      }else{
        let diff=(new Date(log.date)-new Date(lastDate))/(1000*60*60*24);

        if(diff===1){
          streak++;
          consistency+=0.5;

          // ✅ NEW SYSTEM
          totalPoints += consistency;
        }
        else if(diff>1){
          missedDays += (diff-1);

          let penalty=(diff-1)*2;
          consistency=Math.max(0,consistency-penalty);
          streak=1;
        }
      }

      if(log.work==="weight"){
        activity += log.amount * 2;
        totalPoints += log.amount * 2;
        weightHours += log.amount;
      }
      else if(log.work==="walk" || log.work==="run"){
        activity += log.amount;
        totalPoints += log.amount;
        walkRunKM += log.amount;
      }
      else{
        restUsed++;
      }

      lastDate=log.date;
    });

    // 💰 MONEY CALCULATION
    let moneyGained = 0;
    let moneyLost = 0;

    // bonuses
    moneyGained += Math.floor(walkRunKM / 10) * 20;
    moneyGained += Math.floor(weightHours / 4) * 20;

    // penalties
    if(totalPoints < 50){
      moneyLost += 50;
    }

    moneyLost += Math.floor(missedDays / 3) * 30;

    result[player]={
      total:Number(totalPoints.toFixed(2)),
      activity:Number(activity.toFixed(2)),
      streak,
      consistency:Number(consistency.toFixed(2)),
      restLeft:REST_LIMIT-restUsed,
      moneyGained,
      moneyLost
    };
  });

  // 🏆 Apply last & second last penalties
  let sorted = Object.entries(result)
    .sort((a,b)=>a[1].total - b[1].total);

  if(sorted.length >= 2){
    sorted[0][1].moneyLost += 100; // last
    sorted[1][1].moneyLost += 50;  // second last
  }

  updatePodium(result);
  updateCards(result);
  updateConsistencyLeader(result);
  updateDangerZone(result);
}

function updatePodium(result){
  let sorted=Object.entries(result)
    .sort((a,b)=>b[1].total-a[1].total);

  const classes=["first","second","third","fourth"];
  const podium=document.getElementById("podium");
  podium.innerHTML="";

  sorted.forEach((p,i)=>{
    podium.innerHTML+=`
      <div class="${classes[i]}">
        ${p[0]}<br>${p[1].total} pts
      </div>`;
  });
}

function updateCards(result){
  const container=document.getElementById("playerCards");
  container.innerHTML="";

  Object.entries(result).forEach(([name,data])=>{

    const net = data.moneyGained - data.moneyLost;
    const netColor = net >= 0 ? "#4caf50" : "#ff5252";
    const netBg = net >= 0 
      ? "rgba(76,175,80,0.15)" 
      : "rgba(255,82,82,0.15)";

    container.innerHTML+=`
      <div class="card">

        <!-- TOP -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3 style="margin:0;">🏆 ${name}</h3>

          <div style="
            background:rgba(255,255,255,0.08);
            padding:10px 12px;
            border-radius:10px;
            font-size:14px;
            min-width:120px;
          ">
            <div style="color:#4caf50;">+₹${data.moneyGained}</div>
            <div style="color:#ff5252;">-₹${data.moneyLost}</div>
          </div>
        </div>

        <!-- STATS -->
        <div class="stats"
        ">
          <p style="font-weight:600px;">Total: ${data.total}</p>
          <p style="font-weight:600px;">Streak: ${data.streak}</p>
          <p style="font-weight:600px;">Consistency: ${data.consistency}</p>
          <p style="font-weight:600px;">Rest Left: ${data.restLeft}</p>
        </div>

        <!-- BOTTOM ROW -->
        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-top:12px;
        ">

          <button class="deletePlayerBtn" onclick="deletePlayer('${name}')">
            Delete Player
          </button>

          <!-- NET BOX -->
          <div style="
            padding:8px 14px;
            border-radius:20px;
            font-weight:bold;
            background:${netBg};
            color:${netColor};
            border:1px solid ${netColor};
          ">
            ₹${net >= 0 ? "+" : ""}${net}
          </div>

        </div>

      </div>
    `;
  });
}
    
function updateConsistencyLeader(result){

  let sorted = Object.entries(result)
    .sort((a,b)=>b[1].consistency - a[1].consistency);

  if(sorted.length===0) return;

  const leader = sorted[0];

  document.getElementById("leaderName").innerHTML =
` <span style="font-size:20px;font-weight:700;">👑 ${leader[0]}</span><br>
<span style="font-size:20px;font-weight:700; color: #00ff00;">${leader[1].streak} DAYS</span>`;
}

function updateDangerZone(result){

  let sorted = Object.entries(result)
  .sort((a,b)=>a[1].total - b[1].total);

  if(sorted.length < 2) return;

  const player1 = sorted[0];
  const player2 = sorted[1];

  document.getElementById("dangerPlayers").innerHTML =
    "⚠️ " + player1[0] + " (" + player1[1].total + ")<br>" +
    "⚠️ " + player2[0] + " (" + player2[1].total + ")";
}

function applyFilters(){

  const date = document.getElementById("filterDate").value;
  const player = document.getElementById("filterPlayer").value;

  let filtered = Object.entries(window.allLogs || {});

  if(date){
    filtered = filtered.filter(([id,log]) => log.date === date);
  }

  if(player){
    filtered = filtered.filter(([id,log]) => log.name === player);
  }

  displayLogs(Object.fromEntries(filtered), date, player);
}

function resetFilters(){

  document.getElementById("filterDate").value="";
  document.getElementById("filterPlayer").value="";

  displayLogs(window.allLogs);
}

function displayLogs(logs, date=null, player=null){

  const list = document.getElementById("historyList");
  const title = document.getElementById("historyTitle");

  list.innerHTML="";

  const today = new Date().toISOString().split("T")[0];

  if(!date && !player){
    title.innerText = "Today's Logs";
    logs = Object.fromEntries(
      Object.entries(logs).filter(([id,l]) => l.date === today)
    );
  }
  else if(date && !player){
    title.innerText = `Logs on ${date}`;
  }
  else if(date && player){
    title.innerText = `${player}'s Logs on ${date}`;
  }

  const entries = Object.entries(logs).sort((a,b)=>
    new Date(b[1].date) - new Date(a[1].date)
  );

  if(entries.length === 0){
    list.innerHTML = "<li>No logs found</li>";
    return;
  }

  entries.forEach(([id,log])=>{
    list.innerHTML += `
      <li style="
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
">
        
        <div>
          <h3>${log.name}</h3>
          <strong>${log.date} • ${log.work} ${log.amount}</strong>
        </div>

        <div>
          <button onclick="editLog('${id}')">✏️</button>
          <button onclick="deleteLog('${id}')">🗑</button>
        </div>

      </li>
    `;
  });
}
    
    
function renderHistory(logs){

  window.allLogs = logs; // store globally for filtering
  displayLogs(logs);

}

function editLog(id){
  db.ref("logs/"+id).once("value").then(s=>{
    const log=s.val();
    document.getElementById("name").value=log.name;
    document.getElementById("date").value=log.date;
    document.getElementById("work").value=log.work;
    document.getElementById("extraInput").value=log.amount;
    editId=id;
    openModal();
  });
}

function deleteLog(id){
  db.ref("logs/"+id).remove();
}
</script>

</body>
</html>
